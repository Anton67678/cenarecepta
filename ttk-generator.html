<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цена Рецепта — Генератор документации</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #faf7f2;
    --cream: #f2ede4;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --rust: #8b3a0f;
    --sage: #5a6e4a;
    --border: #d4c9b4;
    --muted: #7a6e5e;
    --card: #ffffff;
    --shadow: rgba(26,18,8,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    letter-spacing: 0.03em;
  }
  .logo span { color: var(--gold-light); }
  .header-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    border: 1px solid rgba(212,160,23,0.4);
    color: var(--gold-light);
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.08em;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 420px 1fr;
    min-height: calc(100vh - 60px);
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    background: var(--cream);
    border-right: 1px solid var(--border);
    padding: 2rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .json-area {
    width: 100%;
    min-height: 260px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.6;
    background: var(--ink);
    color: #e8d9b0;
    border: 1px solid #3a2e1a;
    border-radius: 6px;
    padding: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .json-area:focus { border-color: var(--gold); }
  .json-area::placeholder { color: #5a4e3a; }

  .example-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .example-btn:hover { border-color: var(--gold); color: var(--gold); }

  .docs-checklist { display: flex; flex-direction: column; gap: 0.5rem; }
  .doc-check {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .doc-check:hover { background: rgba(184,134,11,0.07); }
  .doc-check input[type="checkbox"] { display: none; }
  .check-box {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .doc-check input:checked + .check-box {
    background: var(--gold);
    border-color: var(--gold);
  }
  .check-mark { color: white; font-size: 10px; display: none; }
  .doc-check input:checked + .check-box .check-mark { display: block; }
  .doc-name {
    font-size: 0.85rem;
    color: var(--ink);
  }
  .doc-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-left: auto;
  }

  .gen-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.9rem 1.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    letter-spacing: 0.02em;
  }
  .gen-btn:hover:not(:disabled) { background: var(--rust); transform: translateY(-1px); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    display: none;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .generating .spinner { display: block; }
  .generating .btn-text { display: none; }

  .error-box {
    background: #fff0ed;
    border: 1px solid #f5c6b8;
    border-radius: 4px;
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    color: var(--rust);
    display: none;
    line-height: 1.5;
  }

  /* ── RIGHT PANEL ── */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tabs */
  .tabs-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    gap: 0;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    padding: 0.9rem 1.1rem;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .tab-actions {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    padding: 0 0.5rem;
  }
  .action-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: white;
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Document area */
  .doc-area {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem 3rem;
    background: var(--paper);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon {
    font-size: 3rem;
    opacity: 0.3;
  }
  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--muted);
  }
  .empty-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    opacity: 0.6;
  }

  /* ── DOCUMENT STYLES ── */
  .doc-content {
    max-width: 820px;
    margin: 0 auto;
  }

  .doc-header-block {
    text-align: right;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .doc-stamp {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .doc-sign-line {
    display: inline-block;
    width: 200px;
    border-bottom: 1px solid var(--ink);
    margin-left: 1rem;
    vertical-align: middle;
  }

  .doc-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.4rem;
  }
  .doc-subtitle {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 2rem;
    font-style: italic;
  }

  .doc-section {
    margin-bottom: 1.8rem;
  }
  .doc-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .doc-text {
    font-size: 0.9rem;
    line-height: 1.75;
    text-align: justify;
  }

  /* Tables */
  .doc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-bottom: 0.5rem;
  }
  .doc-table th {
    background: var(--ink);
    color: var(--paper);
    padding: 8px 10px;
    text-align: center;
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 0.78rem;
    border: 1px solid var(--ink);
  }
  .doc-table td {
    padding: 7px 10px;
    border: 1px solid var(--border);
    vertical-align: middle;
  }
  .doc-table tr:nth-child(even) td { background: #faf7f0; }
  .doc-table tr:hover td { background: #f5f0e8; }
  .doc-table td:first-child { text-align: center; color: var(--muted); font-size: 0.75rem; }
  .doc-table td.num { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
  .doc-table td.total-row { font-weight: 600; background: #f0ebe0 !important; }

  .doc-footer-row {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .doc-sign-block {
    margin-top: 2.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .sign-line {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .sign-role { font-size: 0.8rem; color: var(--muted); }
  .sign-underline {
    border-bottom: 1px solid var(--border);
    height: 24px;
  }

  .nutrition-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 0.75rem;
  }
  .nutrition-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    text-align: center;
  }
  .nutrition-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--rust);
  }
  .nutrition-unit { font-size: 0.7rem; color: var(--muted); }
  .nutrition-label { font-size: 0.75rem; margin-top: 0.2rem; }

  .gost-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    letter-spacing: 0.06em;
  }

  .loading-overlay {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1.5rem;
  }
  .loading-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--muted);
  }
  .loading-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    margin: 0 3px;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6)} 40%{transform:scale(1)} }

  /* Print / PDF styles */
  @media print {
    header, .panel-left, .tabs-bar { display: none !important; }
    .app { display: block; }
    .panel-right { overflow: visible; }
    .doc-area { padding: 1cm 2cm; }
    body { background: white; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Цена <span>Рецепта</span></div>
  <div class="header-badge">ГОСТ Р 31987-2012</div>
</header>

<div class="app">
  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div>
      <div class="section-label">JSON рецепта</div>
      <textarea class="json-area" id="jsonInput" placeholder='{"dish_name": "Паровая телятина", "card_number": 1, ...}'></textarea>
      <div style="margin-top:0.5rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="example-btn" onclick="loadExample()">← пример JSON</button>
        <button class="example-btn" onclick="clearJson()">очистить</button>
      </div>
    </div>

    <div>
      <div class="section-label">Документы</div>
      <div class="docs-checklist">
        <label class="doc-check">
          <input type="checkbox" id="chk_ttk" checked>
          <div class="check-box"><span class="check-mark">✓</span></div>
          <span class="doc-name">Технико-технологическая карта</span>
          <span class="doc-sub">ТТК</span>
        </label>
        <label class="doc-check">
          <input type="checkbox" id="chk_tk" checked>
          <div class="check-box"><span class="check-mark">✓</span></div>
          <span class="doc-name">Технологическая карта</span>
          <span class="doc-sub">ТК</span>
        </label>
        <label class="doc-check">
          <input type="checkbox" id="chk_kk" checked>
          <div class="check-box"><span class="check-mark">✓</span></div>
          <span class="doc-name">Калькуляционная карта</span>
          <span class="doc-sub">КК</span>
        </label>
        <label class="doc-check">
          <input type="checkbox" id="chk_pv" checked>
          <div class="check-box"><span class="check-mark">✓</span></div>
          <span class="doc-name">Пищевая ценность</span>
          <span class="doc-sub">КБЖУ</span>
        </label>
      </div>
    </div>

    <div id="errorBox" class="error-box"></div>

    <button class="gen-btn" id="genBtn" onclick="generate()">
      <div class="spinner"></div>
      <span class="btn-text">Сформировать документы</span>
    </button>

    <div style="font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--muted); line-height:1.6;">
      Документы формируются через Claude AI и соответствуют требованиям ГОСТ Р 31987-2012. Для печати используйте кнопку «Печать» в браузере.
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="tabs-bar" id="tabsBar">
      <button class="tab active" data-tab="ttk">ТТК</button>
      <button class="tab" data-tab="tk">ТК</button>
      <button class="tab" data-tab="kk">Калькуляция</button>
      <button class="tab" data-tab="pv">Пищевая ценность</button>
      <div class="tab-actions">
        <button class="action-btn" id="printBtn" disabled onclick="printDoc()">🖨 Печать</button>
        <button class="action-btn" id="pdfBtn" disabled onclick="savePDF()">↓ PDF</button>
      </div>
    </div>

    <div class="doc-area" id="docArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Документы не сформированы</div>
        <div class="empty-sub">Введите JSON рецепта и нажмите «Сформировать»</div>
      </div>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">Генерирую документацию…</div>
      </div>
      <div id="docContent" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let docs = { ttk: '', tk: '', kk: '', pv: '' };
let activeTab = 'ttk';
let lastJson = null;

// ── TABS ──
document.querySelectorAll('.tab[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    renderDoc();
  });
});

function renderDoc() {
  const content = document.getElementById('docContent');
  const html = docs[activeTab] || '';
  if (html) {
    content.innerHTML = html;
    content.style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

// ── EXAMPLE JSON ──
function loadExample() {
  const ex = {
    dish_name: "Паровая телятина с салатным миксом",
    card_number: 17166,
    date: "13.04.2016",
    yield_per_portion: 235,
    portions: 1,
    ingredients: [
      { name: "Говядина вырезка", brutto: 220, netto: 206, yield_g: 130, price_per_kg: 1200, calories: 187, protein: 20.1, fat: 11.8, carbs: 0 },
      { name: "Соль поваренная", brutto: 2, netto: 2, yield_g: 2, price_per_kg: 15, calories: 0, protein: 0, fat: 0, carbs: 0 },
      { name: "Лимон", brutto: 24, netto: 10, yield_g: 10, price_per_kg: 120, calories: 34, protein: 0.9, fat: 0.1, carbs: 9.2 },
      { name: "Зелень Тимьян", brutto: 2.3, netto: 2, yield_g: 2, price_per_kg: 400, calories: 101, protein: 2.3, fat: 1.0, carbs: 8.1 },
      { name: "Зелень Розмарин", brutto: 3.4, netto: 3, yield_g: 3, price_per_kg: 380, calories: 131, protein: 3.3, fat: 5.9, carbs: 20.7 },
      { name: "Чеснок", brutto: 6.4, netto: 5, yield_g: 5, price_per_kg: 180, calories: 149, protein: 6.5, fat: 0.5, carbs: 29.9 },
      { name: "Морковь столовая свежая", brutto: 39, netto: 29, yield_g: 20, price_per_kg: 35, calories: 35, protein: 1.3, fat: 0.1, carbs: 6.9 },
      { name: "Зелень Салат", brutto: 28, netto: 20, yield_g: 20, price_per_kg: 200, calories: 15, protein: 1.5, fat: 0.2, carbs: 2.1 },
      { name: "Салат Лолло Бьянко", brutto: 6.9, netto: 5, yield_g: 5, price_per_kg: 250, calories: 14, protein: 1.3, fat: 0.2, carbs: 1.9 },
      { name: "Помидоры черри", brutto: 36, netto: 35, yield_g: 35, price_per_kg: 280, calories: 20, protein: 0.6, fat: 0.2, carbs: 4.2 },
      { name: "Голубика", brutto: 15, netto: 15, yield_g: 15, price_per_kg: 600, calories: 57, protein: 0.7, fat: 0.3, carbs: 14.9 },
      { name: "Заправка бальзамическая", brutto: 10, netto: 10, yield_g: 10, price_per_kg: 450, calories: 88, protein: 0.5, fat: 0.3, carbs: 17.0 },
      { name: "Каперсы маринованные", brutto: 7, netto: 7, yield_g: 7, price_per_kg: 380, calories: 23, protein: 2.4, fat: 0.9, carbs: 4.9 },
      { name: "Маслины с косточкой", brutto: 8, netto: 8, yield_g: 8, price_per_kg: 320, calories: 166, protein: 1.0, fat: 17.3, carbs: 3.8 },
      { name: "Соус бальзамический «Glassy»", brutto: 5, netto: 5, yield_g: 5, price_per_kg: 700, calories: 120, protein: 0.2, fat: 0.1, carbs: 30.2 },
      { name: "Лук зелёный (перо)", brutto: 3.8, netto: 3, yield_g: 3, price_per_kg: 150, calories: 20, protein: 1.3, fat: 0.1, carbs: 4.3 }
    ],
    cooking_method: "паровая обработка",
    storage_temp: "+4",
    storage_hours: 24
  };
  document.getElementById('jsonInput').value = JSON.stringify(ex, null, 2);
}

function clearJson() {
  document.getElementById('jsonInput').value = '';
  docs = { ttk: '', tk: '', kk: '', pv: '' };
  document.getElementById('docContent').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('printBtn').disabled = true;
  document.getElementById('pdfBtn').disabled = true;
}

// ── GENERATE ──
async function generate() {
  const raw = document.getElementById('jsonInput').value.trim();
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';

  if (!raw) { showError('Вставьте JSON рецепта'); return; }
  let recipe;
  try { recipe = JSON.parse(raw); }
  catch(e) { showError('Ошибка в JSON: ' + e.message); return; }

  const wantTTK = document.getElementById('chk_ttk').checked;
  const wantTK  = document.getElementById('chk_tk').checked;
  const wantKK  = document.getElementById('chk_kk').checked;
  const wantPV  = document.getElementById('chk_pv').checked;
  if (!wantTTK && !wantTK && !wantKK && !wantPV) { showError('Выберите хотя бы один документ'); return; }

  lastJson = recipe;
  const btn = document.getElementById('genBtn');
  btn.classList.add('generating');
  btn.disabled = true;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('docContent').style.display = 'none';
  document.getElementById('loadingOverlay').style.display = 'flex';

  docs = { ttk: '', tk: '', kk: '', pv: '' };

  try {
    // Calculate locally for speed: netto sum, costs, nutrition
    const calc = calcLocally(recipe);

    if (wantTTK) docs.ttk = await genViaAPI(recipe, calc, 'TTK');
    if (wantTK)  docs.tk  = await genViaAPI(recipe, calc, 'TK');
    if (wantKK)  docs.kk  = buildKK(recipe, calc);
    if (wantPV)  docs.pv  = buildPV(recipe, calc);

    document.getElementById('printBtn').disabled = false;
    document.getElementById('pdfBtn').disabled = false;
    renderDoc();
  } catch(e) {
    showError('Ошибка генерации: ' + e.message);
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('loadingOverlay').style.display = 'none';
  }

  btn.classList.remove('generating');
  btn.disabled = false;
}

// ── LOCAL CALCULATIONS ──
function calcLocally(r) {
  const ings = r.ingredients || [];
  let totalNetto = 0, totalCost = 0;
  let totalProt = 0, totalFat = 0, totalCarb = 0, totalCal = 0;

  const rows = ings.map(ing => {
    const netto = parseFloat(ing.netto) || 0;
    const price = parseFloat(ing.price_per_kg) || 0;
    const cost = (netto / 1000) * price;
    totalNetto += netto;
    totalCost  += cost;
    totalProt  += ((ing.protein || 0) * netto / 100);
    totalFat   += ((ing.fat    || 0) * netto / 100);
    totalCarb  += ((ing.carbs  || 0) * netto / 100);
    totalCal   += ((ing.calories || 0) * netto / 100);
    return { ...ing, cost };
  });

  return { rows, totalNetto, totalCost, totalProt, totalFat, totalCarb, totalCal };
}

// ── API CALL ──
async function genViaAPI(recipe, calc, docType) {
  const today = new Date().toLocaleDateString('ru-RU');
  const systemPrompt = `Ты — технолог общественного питания. Составляй официальные технологические документы строго по ГОСТ Р 31987-2012. Возвращай ТОЛЬКО HTML-код документа (без DOCTYPE, без <html>/<body> тегов), с использованием CSS-классов doc-content, doc-header-block, doc-title, doc-subtitle, doc-section, doc-section-title, doc-text, doc-table, doc-footer-row, doc-sign-block, gost-note. Стиль деловой, официальный. Без лишних комментариев и объяснений.`;

  const ingTable = (recipe.ingredients || []).map((ing, i) =>
    `${i+1}. ${ing.name}: брутто=${ing.brutto}г, нетто=${ing.netto}г, выход=${ing.yield_g}г`
  ).join('\n');

  let userMsg = '';
  if (docType === 'TTK') {
    userMsg = `Составь Технико-технологическую карту (ТТК) по ГОСТ Р 31987-2012.

Данные:
- Название блюда: ${recipe.dish_name}
- Номер ТТК: ${recipe.card_number}
- Дата: ${recipe.date || today}
- Выход на порцию: ${recipe.yield_per_portion} г
- Количество порций: ${recipe.portions}
- Способ приготовления: ${recipe.cooking_method || 'тепловая обработка'}
- Хранение: ${recipe.storage_hours || 24} ч при ${recipe.storage_temp || '+4'}°C

Ингредиенты:
${ingTable}

Сумма нетто: ${calc.totalNetto.toFixed(1)} г

Создай HTML с разделами: заголовок документа (Утверждаю / Руководитель), номер и название ТТК, 1.Область применения, 2.Требования к сырью, 3.Рецептура (таблица с колонками №/Наименование/Брутто г/Нетто г/Выход г), 4.Технологический процесс (развёрнутый), 5.Условия хранения и сроки реализации, блок подписей (Бухгалтер, Шеф-повар, Ответственный за ТТК). Используй CSS-классы из системного промта.`;
  } else {
    userMsg = `Составь Технологическую карту (ТК) по ГОСТ Р 31987-2012.

Данные:
- Название: ${recipe.dish_name}
- Номер: ${recipe.card_number}
- Дата: ${recipe.date || today}
- Выход на 1 порцию: ${recipe.yield_per_portion} г
- Количество порций в примере: ${recipe.portions}

Ингредиенты:
${ingTable}

Создай HTML с разделами: заголовок (Утверждаю/Руководитель/Источник рецептуры), номер и название ТК, таблица рецептуры (с колонками: №/Наименование/Брутто 1 порц./Нетто 1 порц./Выход 1 порц./Брутто 10 порц./Нетто 10 порц./Выход 10 порц.), пищевая ценность (Белки/Жиры/Углеводы/Ккал: ${calc.totalProt.toFixed(1)}/${calc.totalFat.toFixed(1)}/${calc.totalCarb.toFixed(1)}/${calc.totalCal.toFixed(0)}), технологический процесс с условиями хранения (${recipe.storage_hours || 24} ч при ${recipe.storage_temp || '+4'}°C), блок подписей. Используй CSS-классы из системного промта.`;
  }

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || response.statusText);
  }
  const data = await response.json();
  const text = data.content?.map(b => b.text || '').join('') || '';
  return `<div class="doc-content">${text}</div>`;
}

        <tbody>
          ${rows}
          <tr>
            <td colspan="2" class="total-row" style="text-align:right; font-weight:700;">ИТОГО себестоимость:</td>
            <td class="num total-row">${calc.totalNetto.toFixed(1)}</td>
            <td class="num total-row">—</td>

          </tr>

      </table>
    </div>

    <div class="doc-section" style="margin-top:1.5rem;">
      <div class="doc-section-title">Расчёт на разное количество порций</div>

            <th>1 порция, г</th>
            <th>10 порций, г</th>

        <tbody>

          </tr>`).join('')}
          <tr>
            <td class="total-row" style="text-align:right; font-weight:700;">ИТОГО нетто:</td>
            <td class="num total-row">${calc.totalNetto.toFixed(1)}</td>

      <div class="sign-line"><span class="sign-role">Шеф-повар</span><div class="sign-underline"></div></div>

    <div class="gost-note">Документ составлен в соответствии с требованиями ГОСТ Р 31987-2012</div>

// ── LOCAL PV (Пищевая ценность) ──
function buildPV(recipe, calc) {
  const cal  = calc.totalCal.toFixed(0);
  const prot = calc.totalProt.toFixed(1);
  const fat  = calc.totalFat.toFixed(1);
  const carb = calc.totalCarb.toFixed(1);
  const kj   = (calc.totalCal * 4.184).toFixed(0);

  const rows = calc.rows.map((ing, i) => {
    const n = parseFloat(ing.netto) || 0;
    return `<tr>
      <td>${i+1}</td>
      <td style="text-align:left">${ing.name}</td>
      <td class="num">${n.toFixed(1)}</td>
      <td class="num">${(((ing.calories||0)*n/100)).toFixed(1)}</td>
      <td class="num">${(((ing.protein||0)*n/100)).toFixed(2)}</td>
      <td class="num">${(((ing.fat||0)*n/100)).toFixed(2)}</td>
      <td class="num">${(((ing.carbs||0)*n/100)).toFixed(2)}</td>
    </tr>`;
  }).join('');

  return `<div class="doc-content">
    <div class="doc-title">ПИЩЕВАЯ ЦЕННОСТЬ БЛЮДА</div>
    <div class="doc-subtitle">${recipe.dish_name}</div>
    <div style="text-align:center; font-size:0.8rem; color:var(--muted); margin-bottom:1.5rem;">Расчёт на 1 порцию (выход ${recipe.yield_per_portion || '—'} г)</div>

    <div class="nutrition-grid">
      <div class="nutrition-card">
        <div class="nutrition-value">${cal}</div>
        <div class="nutrition-unit">ккал / ${kj} кДж</div>
        <div class="nutrition-label">Калорийность</div>
      </div>
      <div class="nutrition-card">
        <div class="nutrition-value">${prot}</div>
        <div class="nutrition-unit">г</div>
        <div class="nutrition-label">Белки</div>
      </div>
      <div class="nutrition-card">
        <div class="nutrition-value">${fat}</div>
        <div class="nutrition-unit">г</div>
        <div class="nutrition-label">Жиры</div>
      </div>
      <div class="nutrition-card">
        <div class="nutrition-value">${carb}</div>
        <div class="nutrition-unit">г</div>
        <div class="nutrition-label">Углеводы</div>
      </div>
    </div>

    <div class="doc-section" style="margin-top:2rem;">
      <div class="doc-section-title">Детализация по ингредиентам</div>
      <table class="doc-table">
        <thead>
          <tr>
            <th style="width:35px">№</th>
            <th style="text-align:left">Ингредиент</th>
            <th>Нетто, г</th>
            <th>Ккал</th>
            <th>Белки, г</th>
            <th>Жиры, г</th>
            <th>Углеводы, г</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
          <tr>
            <td colspan="2" class="total-row" style="text-align:right; font-weight:700;">ИТОГО на порцию:</td>
            <td class="num total-row">${calc.totalNetto.toFixed(1)}</td>
            <td class="num total-row" style="color:var(--rust); font-weight:700;">${cal}</td>
            <td class="num total-row">${prot}</td>
            <td class="num total-row">${fat}</td>
            <td class="num total-row">${carb}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top:1.5rem; padding:1rem; background:var(--cream); border:1px solid var(--border); border-radius:4px; font-size:0.8rem; line-height:1.7; color:var(--muted);">
      <strong style="color:var(--ink);">Примечание.</strong> Пищевая ценность рассчитана по справочным данным на 100 г сырья в соответствии с «Таблицами химического состава и калорийности российских продуктов питания» (Скурихин, Тутельян, 2007). Фактическая пищевая ценность может незначительно отличаться в зависимости от партии сырья и технологических потерь при тепловой обработке.
    </div>

    <div class="gost-note">Документ составлен в соответствии с требованиями ГОСТ Р 31987-2012</div>
  </div>`;
}

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('autoload') === '1') {
    try {
      const stored = sessionStorage.getItem('ttk_json');
      if (stored) {
        document.getElementById('jsonInput').value = stored;
        // Auto-generate after short delay to let page settle
        setTimeout(() => generate(), 300);
      }
    } catch(e) {}
  }
});
